<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Servidores</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold">Parcial Servidores</h4>
    <i class="bi bi-bell fs-4"></i>
  </div>

  <!-- PERFIL -->
  <div class="card p-3 mb-4 shadow-sm">
    <div class="d-flex align-items-center">
      <div class="avatar me-3">
        <i class="bi bi-person"></i>
      </div>
      <div>
        <h6 class="mb-0 fw-bold">Juan Caicedo - Karolay Monroy</h6>
        <small class="text-muted">Server Administrators</small><br>
        <span class="badge bg-success mt-1">● SYSTEM ONLINE</span>
      </div>
    </div>
  </div>


  <h6 class="text-muted mb-3">CLOUD STORAGE & INFRASTRUCTURE</h6>

  <div class="row g-4">

    <div class="col-md-6">
      <div class="card server-card p-3">
        <i class="bi bi-hdd icon"></i>
        <h6 class="mt-3 fw-bold">SMB Server</h6>
        <small class="text-muted">Windows File Sharing</small>

        <button class="btn btn-primary mt-3 w-100 upload-btn" data-protocol="smb">Subir archivo</button>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card server-card p-3">
        <i class="bi bi-folder icon"></i>
        <h6 class="mt-3 fw-bold">FTP Server</h6>
        <small class="text-muted">File Transfer Protocol</small>

        <button class="btn btn-primary mt-3 w-100 upload-btn" data-protocol="ftp">Subir archivo</button>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card server-card p-3">
        <i class="bi bi-cloud icon"></i>
        <h6 class="mt-3 fw-bold">NFS Storage</h6>
        <small class="text-muted">Network File System</small>

        <button class="btn btn-primary mt-3 w-100 upload-btn" data-protocol="nfs">Subir archivo</button>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card server-card p-3">
        <i class="bi bi-box icon"></i>
        <h6 class="mt-3 fw-bold">S3 Buckets</h6>
        <small class="text-muted">Object Storage</small>

        <button class="btn btn-primary mt-3 w-100 upload-btn" data-protocol="s3">Subir archivo</button>
      </div>
    </div>

  </div>

</div>

<div class="modal fade" id="uploadModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title">Subir Archivo</h6>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="file" class="form-control" id="uploadFileInput">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="confirmUploadBtn">Subir</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const buttons = document.querySelectorAll(".upload-btn");
  const modal = new bootstrap.Modal(document.getElementById('uploadModal'));
  const fileInput = document.getElementById('uploadFileInput');
  const confirmUploadBtn = document.getElementById('confirmUploadBtn');
  const apiBase = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : window.location.origin;
  let selectedProtocol = null;

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      selectedProtocol = btn.dataset.protocol;
      fileInput.value = "";
      modal.show();
    });
  });

  confirmUploadBtn.addEventListener("click", async () => {
    const file = fileInput.files[0];
    if (!selectedProtocol) {
      alert("Selecciona un protocolo.");
      return;
    }
    if (!file) {
      alert("Selecciona un archivo.");
      return;
    }

    const formData = new FormData();
    formData.append("protocol", selectedProtocol);
    formData.append("file", file);

    try {
      const response = await fetch(`${apiBase}/upload`, {
        method: "POST",
        body: formData,
      });

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.detail || "Error en la subida");
      }

      alert(payload.message || "Archivo subido correctamente");
      modal.hide();
    } catch (error) {
      alert(error.message || "No se pudo subir el archivo");
    }
  });
</script>

</body>
</html>
